<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — DocGen AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg: #0a0a0f; --surface: #111118; --surface2: #16161f;
    --border: #1e1e2e; --border2: #2a2a3e;
    --accent: #7c6af7; --accent2: #a78bfa; --accent-glow: rgba(124,106,247,0.15);
    --text: #e8e8f0; --muted: #6b6b8a; --muted2: #9090b0; --red: #f87171;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
  }
  .auth-card {
    width: 100%; max-width: 460px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    position: relative; overflow: hidden;
  }
  .auth-card::before {
    content: '';
    position: absolute; top: -80px; right: -80px;
    width: 220px; height: 220px;
    background: radial-gradient(circle, rgba(124,106,247,0.18), transparent 70%);
  }
  .auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), #c084fc);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: #fff;
    box-shadow: 0 0 24px rgba(124,106,247,0.3);
  }
  .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; }
  .logo-text span { color: var(--accent2); }
  h1 { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; margin-bottom: 6px; }
  .auth-sub { color: var(--muted2); font-size: 14px; margin-bottom: 28px; }

  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 13px; font-weight: 500; color: var(--muted2); margin-bottom: 6px; }
  .input-wrap { position: relative; }
  .input-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 13px; }
  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 9px;
    padding: 10px 13px 10px 38px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .form-input::placeholder { color: var(--muted); }
  .btn-submit {
    width: 100%;
    background: var(--accent);
    color: #fff; border: none;
    border-radius: 9px; padding: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
    margin-top: 8px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-submit:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 6px 24px var(--accent-glow); }
  .auth-footer { margin-top: 20px; text-align: center; font-size: 14px; color: var(--muted2); }
  .auth-footer a { color: var(--accent2); text-decoration: none; font-weight: 500; }
  .auth-footer a:hover { text-decoration: underline; }
  .flash-msg {
    background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3);
    color: var(--red); padding: 10px 16px; border-radius: 8px;
    margin-bottom: 20px; font-size: 13px;
    display: flex; align-items: center; gap: 8px;
  }
  .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .divider span { font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<div class="auth-card">
  <div class="auth-logo">
    <div class="logo-icon"><i class="fas fa-bolt"></i></div>
    <div class="logo-text">Doc<span>Gen</span> AI</div>
  </div>
  <h1>Create an account</h1>
  <p class="auth-sub">Start generating professional documents in seconds.</p>

  {% with msgs = get_flashed_messages() %}
    {% for m in msgs %}
      <div class="flash-msg"><i class="fas fa-circle-exclamation"></i> {{ m }}</div>
    {% endfor %}
  {% endwith %}

  <form method="post" action="/signup">
    <div class="form-group">
      <label class="form-label">Full Name</label>
      <div class="input-wrap">
        <i class="fas fa-user input-icon"></i>
        <input type="text" name="name" class="form-input" placeholder="John Smith" required>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <div class="input-wrap">
        <i class="fas fa-envelope input-icon"></i>
        <input type="email" name="email" class="form-input" placeholder="you@example.com" required>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock input-icon"></i>
        <input type="password" name="password" class="form-input" placeholder="Create a password" required minlength="6">
      </div>
    </div>
    <button type="submit" class="btn-submit">
      <i class="fas fa-rocket"></i> Create Account
    </button>
  </form>

  <p class="auth-footer">Already have an account? <a href="/login">Sign in →</a></p>
</div>
</body>
</html>
